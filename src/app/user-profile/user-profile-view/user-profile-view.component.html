<!-- src\app\user-profile\user-profile-view\user-profile-view.component.html -->
<div class="profile-container">

    <div class="sidebar" [ngClass]="{'visible': isSidebarVisible}" >
    <div class="profile-header">
      <img [src]="photoURL" alt="Foto de Perfil" class="profile-picture">
    </div>
    <p class="user-nickname"><strong>{{ userNickname }}</strong></p>

    <nav class="profile-nav">
      <a [routerLink]="['/perfil', uid]" *ngIf="!isOnOwnProfile()">
        <i class="fas fa-user"></i>Meu perfil
      </a>
      <a href="#"><i class="fas fa-map-marker-alt"></i>Minha região</a>
      <a href="#"><i class="fas fa-images"></i>Minhas fotos </a>
      <a href="#"><i class="fas fa-cogs"></i> Minhas preferências</a>
      <a href="#"><i class="fas fa-users"></i> Meus amigos</a>
      <a href="#"><i class="fas fa-star"></i> Meus favoritos</a>
      <a href="#"><i class="fas fa-comments"></i> Bate-papo</a>
      <!-- Você pode adicionar mais links conforme necessário -->
    </nav>
  </div>

  <div class="content">

  <div class="profile-content">
    <div class="profile-info" *ngIf="userName || userNickname || userIdade">
      <h3>Meu perfil</h3>

      <ng-container *ngIf="userIdade">
        <p><strong>Idade:</strong> {{ userIdade }}</p>
      </ng-container>
    </div>
    <div class="profile-interests">
      <h3>Interesses</h3>
      <ul>
        <li>Tema 1</li>
        <li>Tema 2</li>
        <li>Tema 3</li>
      </ul>
    </div>
  </div>

  <div class="profile-footer">
    <a href="mensagem.html" class="btn btn-primary">Enviar mensagem</a>
    <a href="perfil.html" class="btn btn-secondary">Ver perfil</a>
  </div>
</div>
