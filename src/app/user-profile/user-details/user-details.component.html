<!-- src\app\user-profile\user-details\user-details.component.html -->
<!-- Use *ngIf para verificar se userProfile existe antes de tentar acessar suas propriedades -->
<div *ngIf="userProfile">
  <img [src]="userProfile.avatar" alt="Avatar do usuário" class="avatar">
  <h2>{{ userProfile.nickname }}</h2>
  <h3>{{ userProfile.nome }}</h3>
  <p>Email: {{ userProfile.email }}</p>
  <p>Idade: {{ userProfile.idade }}</p>

  <!-- Aqui é onde incluímos o componente de fotos -->
  <app-user-photos [userId]="userProfile.id"></app-user-photos>
</div>
