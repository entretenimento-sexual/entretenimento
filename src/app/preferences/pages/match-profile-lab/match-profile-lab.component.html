<main class="match-profile-lab-page app-page" aria-label="Laboratório do match profile">
  <section class="match-profile-lab-shell stack">
    <app-preferences-page-header
      title="Laboratório do match profile"
      subtitle="Visualização e materialização do documento derivado de discovery."
    >
      <button
        page-actions
        class="btn btn-primary"
        type="button"
        (click)="rebuild()"
        [disabled]="isSaving()"
      >
        {{ isSaving() ? 'Materializando...' : 'Recriar e salvar match profile' }}
      </button>

      <a page-actions class="btn btn-secondary" routerLink="/preferencias">
        Voltar para preferências
      </a>
    </app-preferences-page-header>

    <app-preferences-domain-nav></app-preferences-domain-nav>

    @if (vm$ | async; as vm) {
      @if (vm) {
        <section class="match-profile-lab-section" aria-label="Comparação do match profile">
          <div class="cards-grid">
            <app-match-profile-preview-card
              [title]="'Construído em memória'"
              [matchProfile]="vm.built">
            </app-match-profile-preview-card>

            <app-match-profile-preview-card
              [title]="'Materializado no store'"
              [matchProfile]="vm.stored">
            </app-match-profile-preview-card>
          </div>
        </section>
      } @else {
        <section class="match-profile-lab-section" aria-label="Sem sessão ativa">
          <p>Você precisa estar autenticado para visualizar esta área.</p>
        </section>
      }
    } @else {
      <section class="match-profile-lab-section" aria-label="Carregando laboratório">
        <p>Carregando laboratório do match profile...</p>
      </section>
    }
  </section>
</main>
