<!-- O componente <app-user-icon> sugerido é destinado a representar a interação do usuário com a aplicação. Normalmente, em
  um cabeçalho de aplicativo, é comum ter um ícone que represente o usuário atualmente logado, ou uma opção para o
  usuário fazer login caso ainda não tenha feito.

  Este componente pode incluir funcionalidades como:

  Mostrar uma imagem de perfil ou avatar, se o usuário estiver logado.
  Abrir um menu suspenso ao clicar, com opções como "Perfil", "Configurações", "Logout", etc.
  Se o usuário não estiver logado, pode ser um botão ou link para a página de login. -->
