<!-- src/app/shared/components-globais/mobile-bottom-nav/mobile-bottom-nav.component.html -->
<nav class="mobile-bottom-nav" aria-label="Navegação principal mobile">
  @for (item of items; track trackById($index, item)) {
    <a
      class="mobile-bottom-nav__item"
      [class.mobile-bottom-nav__item--active]="isActive(item)"
      [routerLink]="item.route"
      [attr.aria-label]="item.ariaLabel"
      [attr.aria-current]="isActive(item) ? 'page' : null"
    >
      <span class="mobile-bottom-nav__icon" aria-hidden="true">
        {{ item.icon }}
      </span>

      <span class="mobile-bottom-nav__label">
        {{ item.label }}
      </span>

      @if (formatBadge(item.badgeCount); as badge) {
        <span class="mobile-bottom-nav__badge" aria-hidden="true">
          {{ badge }}
        </span>
      }
    </a>
  }
</nav>
