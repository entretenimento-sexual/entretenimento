<!-- src/app/shared/components-globais/moderation-report/report-content-button/report-content-button.component.html -->
@if (appearance === 'icon') {
  <button
    mat-icon-button
    type="button"
    class="report-button report-button--icon"
    [attr.aria-label]="ariaLabel"
    [disabled]="disabled || submitting()"
    (click)="openReportDialog()"
  >
    <mat-icon aria-hidden="true">flag</mat-icon>
  </button>
} @else if (appearance === 'link') {
  <button
    type="button"
    class="report-button report-button--link"
    [attr.aria-label]="ariaLabel"
    [disabled]="disabled || submitting()"
    (click)="openReportDialog()"
  >
    {{ submitting() ? 'Enviando...' : label }}
  </button>
} @else {
  <button
    mat-stroked-button
    type="button"
    color="warn"
    class="report-button report-button--default"
    [attr.aria-label]="ariaLabel"
    [disabled]="disabled || submitting()"
    (click)="openReportDialog()"
  >
    <mat-icon aria-hidden="true">flag</mat-icon>
    <span>{{ submitting() ? 'Enviando...' : label }}</span>
  </button>
}
