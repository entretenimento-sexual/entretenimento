<!-- src/app/shared/components-globais/confirmacao-dialog/confirmacao-dialog.component.html -->
<section
  class="dialog-container"
  [class.dialog-container--danger]="isDanger"
  aria-labelledby="confirmation-dialog-title"
  aria-describedby="confirmation-dialog-message"
>
  <h2 id="confirmation-dialog-title" class="dialog-title" mat-dialog-title>
    {{ title }}
  </h2>

  <div class="dialog-content" mat-dialog-content>
    <p id="confirmation-dialog-message">{{ message }}</p>
  </div>

  <div class="dialog-actions" mat-dialog-actions align="end">
    <button
      type="button"
      mat-button
      [mat-dialog-close]="false"
      class="dialog-button dialog-button--cancel"
    >
      {{ cancelLabel }}
    </button>

    <button
      type="button"
      mat-button
      [mat-dialog-close]="true"
      class="dialog-button dialog-button--confirm"
    >
      {{ confirmLabel }}
    </button>
  </div>
</section>
