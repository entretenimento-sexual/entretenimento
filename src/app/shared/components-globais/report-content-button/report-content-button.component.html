<!-- src/app/shared/components-globais/report-content-button/report-content-button.component.html -->
<div class="report-content" (click)="$event.stopPropagation()">
  <button
    type="button"
    class="report-content__trigger"
    [disabled]="!canReport || isSubmitting"
    [attr.aria-expanded]="isOpen ? 'true' : 'false'"
    (click)="toggle($event)"
  >
    <i class="fas fa-flag" aria-hidden="true"></i>
    <span>{{ buttonLabel }}</span>
  </button>

  @if (isOpen) {
    <form
      class="report-content__form"
      aria-label="Enviar denúncia"
      (submit)="submit($event)"
    >
      <header class="report-content__header">
        <strong>Denunciar {{ contextLabel }}</strong>
        <p>
          A equipe vai revisar. Use este canal para segurança, abuso, spam ou conteúdo inadequado.
        </p>
      </header>

      <label class="report-content__field">
        <span>Motivo</span>
        <select
          name="reason"
          required
          [(ngModel)]="reason"
          [disabled]="isSubmitting"
        >
          <option value="">Selecione</option>
          @for (option of reasonOptions; track option.value) {
            <option [value]="option.value">
              {{ option.label }}
            </option>
          }
        </select>
      </label>

      <label class="report-content__field">
        <span>Detalhes opcionais</span>
        <textarea
          name="details"
          rows="3"
          maxlength="1200"
          placeholder="Descreva o problema sem enviar dados sensíveis desnecessários."
          [(ngModel)]="details"
          [disabled]="isSubmitting"
        ></textarea>
      </label>

      <div class="report-content__actions">
        <button
          type="submit"
          class="report-content__submit"
          [disabled]="isSubmitting || !reason"
        >
          {{ isSubmitting ? 'Enviando...' : 'Enviar denúncia' }}
        </button>

        <button
          type="button"
          class="report-content__cancel"
          [disabled]="isSubmitting"
          (click)="close($event)"
        >
          Cancelar
        </button>
      </div>
    </form>
  }
</div>
