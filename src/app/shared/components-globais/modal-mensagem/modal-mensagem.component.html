<section
  class="direct-message-dialog"
  role="dialog"
  aria-modal="true"
  aria-labelledby="direct-message-title"
  [attr.aria-busy]="isSending()"
>
  <header class="direct-message-header">
    <div>
      <p class="direct-message-eyebrow">Mensagem direta</p>

      <h2 class="direct-message-title" id="direct-message-title">
        {{ data.profile.nickname }}
      </h2>
    </div>

    <button
      type="button"
      class="direct-message-close"
      (click)="fecharModal()"
      [disabled]="isSending()"
      aria-label="Fechar janela de mensagem"
    >
      <span aria-hidden="true">&times;</span>
    </button>
  </header>

  <div class="direct-message-recipient">
    <img
      [src]="data.profile.photoURL || 'assets/imagem-padrao.webp'"
      class="profile-photo-modal"
      [alt]="'Foto de perfil de ' + data.profile.nickname"
    />

    <div class="recipient-details">
      <strong>{{ data.profile.nickname }}</strong>
      <span>Conversa privada</span>
    </div>
  </div>

  <div class="direct-message-field">
    <label class="message-label" for="direct-message-content">
      Escreva uma mensagem
    </label>

    <textarea
      id="direct-message-content"
      [(ngModel)]="mensagem"
      class="message-textarea"
      placeholder="Digite sua mensagem..."
      maxlength="1000"
      [readOnly]="isSending()"
      [attr.aria-readonly]="isSending()"
      [attr.aria-describedby]="isSending() ? 'direct-message-status' : null"
    ></textarea>

    <div class="direct-message-meta">
      <span
        id="direct-message-status"
        class="sending-feedback"
        role="status"
        aria-live="polite"
      >
        @if (isSending()) {
          Enviando mensagem...
        }
      </span>

      <span class="message-counter">
        {{ mensagem.length }}/1000
      </span>
    </div>
  </div>

  <footer class="direct-message-actions">
    <button
      type="button"
      class="btn btn-ghost direct-message-action"
      (click)="fecharModal()"
      [disabled]="isSending()"
    >
      Cancelar
    </button>

    <button
      type="button"
      class="btn btn-primary direct-message-action direct-message-submit"
      (click)="enviarMensagem()"
      [disabled]="isSending() || !mensagem.trim()"
      [attr.aria-busy]="isSending()"
    >
      {{ isSending() ? 'Enviando...' : 'Enviar' }}
    </button>
  </footer>
</section>
