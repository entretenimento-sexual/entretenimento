<!-- src/app/dashboard/dashboard-layout/dashboard-layout.component.html -->
<a class="sr-only" href="#dashboard-main">
  Pular para o conteúdo principal
</a>

<nav class="dashboard-quick-nav app-toolbar" aria-label="Atalhos do dashboard">
  <a
    class="dashboard-quick-nav__link app-action app-action--ghost"
    routerLink="/dashboard/principal"
    routerLinkActive="dashboard-quick-nav__link--active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    Principal
  </a>

  <a
    class="dashboard-quick-nav__link app-action app-action--ghost"
    routerLink="/dashboard/explorar"
    routerLinkActive="dashboard-quick-nav__link--active"
  >
    Explorar
  </a>

  <a
    class="dashboard-quick-nav__link app-action app-action--primary"
    routerLink="/dashboard/perfis-sugeridos"
    routerLinkActive="dashboard-quick-nav__link--active"
  >
    Sugeridos
  </a>
</nav>

<main
  id="dashboard-main"
  class="dashboard-content"
  role="main"
  tabindex="-1"
  aria-label="Conteúdo do dashboard"
>
  <router-outlet></router-outlet>
</main>
