<!-- src/app/dashboard/discovery/public-profiles-list/public-profiles-list.component.html -->
<section class="public-profiles" aria-label="Perfis públicos disponíveis">
  @if (loading()) {
    <div class="public-profiles__state" role="status" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <p>Carregando perfis...</p>
    </div>
  } @else if (errorMessage()) {
    <div
      class="public-profiles__state public-profiles__state--error"
      role="alert"
    >
      <i class="fas fa-triangle-exclamation" aria-hidden="true"></i>
      <p>{{ errorMessage() }}</p>
    </div>
  } @else if (profiles().length === 0) {
    <div class="public-profiles__state" role="status">
      <i class="fas fa-users" aria-hidden="true"></i>
      <p>Nenhum perfil disponível agora.</p>
    </div>
  } @else {
    <div class="public-profiles__grid">
      @for (profile of profiles(); track trackProfile($index, profile)) {
        <app-user-card
          class="public-profiles__item"
          [user]="toUserCardProfile(profile)"
          [distanciaKm]="getDistance(profile)"
        />
      }
    </div>
  }
</section>
