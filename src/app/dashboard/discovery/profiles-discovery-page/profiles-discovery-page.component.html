<!-- src/app/dashboard/discovery/profiles-discovery-page/profiles-discovery-page.component.html -->

<section
  class="profiles-discovery-page"
  aria-labelledby="discovery-title"
  aria-describedby="discovery-description"
>
  <header class="profiles-discovery-page__intro">
    <p class="profiles-discovery-page__eyebrow">Descoberta</p>

    <h1 id="discovery-title" class="profiles-discovery-page__title">
      Encontre perfis compatíveis
    </h1>

    <p id="discovery-description" class="profiles-discovery-page__description">
      Explore perfis públicos, veja quem está online e abra o perfil antes de iniciar uma conexão.
    </p>
  </header>

  <div class="profiles-discovery-page__topbar" aria-label="Filtros de descoberta">
    <app-discovery-mode-tabs
      [tabs]="tabs"
      [activeMode]="activeMode()"
      (modeChange)="onDiscoveryModeChange($event)"
    />
  </div>

  <main class="profiles-discovery-page__content">
    @switch (activeMode()) {
      @case ('all') {
        <!--
          Todos:
          feed geral/refinado da descoberta.

          Fonte:
          - public_profiles

          Enriquecimento:
          - presença opcional;
          - distância quando houver coordenadas;
          - score/ranking;
          - elegibilidade pública.
        -->
        <app-public-profiles-list
          [profiles]="(publicProfilesFacade.profiles$ | async) ?? []"
          [loading]="(publicProfilesFacade.loading$ | async) ?? false"
          [errorMessage]="(publicProfilesFacade.errorMessage$ | async) ?? null"
        />
      }

      @case ('online') {
        <!--
          Online:
          recorte baseado em presence, hidratado com public_profiles.

          O card já passa pela mesma camada genérica de enrichment usada pelo
          modo Todos.
        -->
        <app-online-users-full
          [embedded]="true"
          [mode]="activeMode()"
        />
      }

      @default {
        <section class="profiles-discovery-page__empty" role="status">
          <p>Este modo de descoberta será liberado em breve.</p>
        </section>
      }
    }
  </main>
</section>
