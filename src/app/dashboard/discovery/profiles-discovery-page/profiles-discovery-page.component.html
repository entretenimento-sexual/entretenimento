<!-- src/app/dashboard/discovery/profiles-discovery-page/profiles-discovery-page.component.html -->

<section
  class="profiles-discovery-page"
  aria-label="Perfis"
>
  <div class="profiles-discovery-page__topbar" aria-label="Filtros de descoberta">
    <app-discovery-mode-tabs
      [tabs]="tabs"
      [activeMode]="activeMode()"
      (modeChange)="onDiscoveryModeChange($event)"
    />
  </div>

  <main class="profiles-discovery-page__content">
    @switch (activeMode()) {
      @case ('all') {
        <!--
          Todos:
          - public_profiles paginado por cursor;
          - cache por usuário/modo/página;
          - presença opcional;
          - compatibilidade, distância, visibilidade e score no enrichment canônico.
        -->
        <app-public-profiles-list
          [profiles]="(publicProfilesFacade.profiles$ | async) ?? []"
          [loading]="(publicProfilesFacade.loading$ | async) ?? false"
          [loadingMore]="(publicProfilesFacade.loadingMore$ | async) ?? false"
          [refreshing]="(publicProfilesFacade.refreshing$ | async) ?? false"
          [hasMore]="(publicProfilesFacade.hasMore$ | async) ?? false"
          [errorMessage]="(publicProfilesFacade.errorMessage$ | async) ?? null"
          (loadMore)="publicProfilesFacade.loadMore()"
          (retry)="publicProfilesFacade.retry()"
        />
      }

      @case ('online') {
        <!--
          Online:
          recorte baseado em presence, hidratado com public_profiles.
          O card passa pela mesma camada de enrichment usada pelo modo Todos.
        -->
        <app-online-users-full
          [embedded]="true"
          [mode]="activeMode()"
        />
      }

      @case ('today') {
        <!--
          Hoje:
          - status temporário publicado pelo próprio usuário;
          - região declarada, sem GPS preciso;
          - leitura e publicação protegidas por Rules e Cloud Functions.
        -->
        @if (currentUser$ | async; as currentUser) {
          <section
            class="profiles-discovery-page__today"
            aria-label="Status de hoje e pessoas disponíveis"
          >
            <app-user-intent-status-composer [user]="currentUser" />
            <app-user-intent-status-radar [user]="currentUser" />
          </section>
        } @else {
          <section
            class="profiles-discovery-page__empty"
            role="status"
            aria-live="polite"
          >
            <p>Preparando sua experiência de hoje...</p>
          </section>
        }
      }

      @default {
        <section class="profiles-discovery-page__empty" role="status">
          <p>Este modo de descoberta será liberado em breve.</p>
        </section>
      }
    }
  </main>
</section>
