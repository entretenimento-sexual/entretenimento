<!-- src/app/dashboard/discovery/profiles-discovery-page/profiles-discovery-page.component.html -->
<section class="profiles-discovery-page" aria-labelledby="discovery-title">
  <!-- Título preservado para acessibilidade, sem poluir visualmente. -->
  <h1 id="discovery-title" class="sr-only">
    Descoberta de perfis
  </h1>

  <div class="profiles-discovery-page__topbar">
    <app-discovery-mode-tabs
      [tabs]="tabs"
      [activeMode]="activeMode()"
      (modeChange)="onDiscoveryModeChange($event)"
    />
  </div>

  <main class="profiles-discovery-page__content">
    @switch (activeMode()) {
      @case ('all') {
        <!--
          Todos:
          feed geral da descoberta.

          Nesta fase, usa PublicProfilesListComponent.
          Próxima evolução: aplicar ranking refinado nesse componente/serviço.
        -->
        <app-public-profiles-list
          [profiles]="(publicProfilesFacade.profiles$ | async) ?? []"
          [loading]="(publicProfilesFacade.loading$ | async) ?? false"
          [errorMessage]="(publicProfilesFacade.errorMessage$ | async) ?? null"
        />
      }

      @case ('online') {
        <!--
          Online:
          fluxo atual já operacionalizado com presença/localização.
        -->
        <app-online-users-full 
          [embedded]="true"
          [mode]="activeMode()"
        />
      }

       @case ('nearby') {
        <app-online-users-full
          [embedded]="true"
          [mode]="activeMode()"
       />
  }

      @default {
        <section class="profiles-discovery-page__empty" role="status">
          <p>Este modo de descoberta será liberado em breve.</p>
        </section>
      }
    }
  </main>
</section>
