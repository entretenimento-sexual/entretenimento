<section class="page-shell online-directory-page" aria-labelledby="onlineDirTitle">
  <header class="page-head">
    <div class="head-left">
      <a
        class="btn btn-ghost back-btn"
        routerLink="/dashboard/principal"
        aria-label="Voltar para o painel principal"
      >
        <i class="fas fa-arrow-left" aria-hidden="true"></i>
        <span class="hide-xs">Voltar</span>
      </a>

      <div class="page-title-group">
        <h1 id="onlineDirTitle" class="page-title">Explorar perfis</h1>
        <p class="page-subtitle">
          Veja quem está online perto de você e ajuste o raio da busca quando quiser.
        </p>
      </div>
    </div>

    <div class="head-actions" aria-label="Modo de exibição">
      <nav class="segmented" role="tablist" aria-label="Modo de exibição dos perfis">
        <a class="seg-btn active" role="tab" aria-selected="true" tabindex="0">
          <i class="fas fa-bolt" aria-hidden="true"></i>
          <span>Online</span>
        </a>

        <button
          type="button"
          class="seg-btn"
          role="tab"
          aria-selected="false"
          title="Em breve"
        >
          <i class="fas fa-users" aria-hidden="true"></i>
          <span>Todos</span>
        </button>
      </nav>
    </div>
  </header>

  <section class="online-full-shell" aria-label="Perfis online">
    <app-online-users></app-online-users>
  </section>
</section>
