<!-- src\app\chat-module\chat-list\chat-list.component.html -->
<div *ngIf="chats.length > 0; else noMessages">
  <div class="chat-list-container">
    <div class="chat-item" *ngFor="let chat of chats">
      <p>{{ chat.lastMessage.content }}</p>
      <a [routerLink]="['/chat', chat.id]">Abrir chat</a>
    </div>
  </div>
</div>
<ng-template #noMessages>
  <p>Você ainda não tem mensagens para exibir</p>
</ng-template>
