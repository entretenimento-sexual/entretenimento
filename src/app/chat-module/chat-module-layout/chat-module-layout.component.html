<!-- src\app\chat-module\chat-module-layout\chat-module-layout.component.html -->
<div class="chat-module-container" style="border: 1px solid black; display: flex; height: 100vh;">

  <div class="user-info-panel" style="border: 1px solid black; width: 20%; display: flex; flex-direction: column;">

    <!-- Seção de Informações do Usuário Logado -->
    <div class="user-details">
      <img [src]="(usuario$ | async)?.photoURL" alt="Foto" class="foto_chat">
      <p>{{ (usuario$ | async)?.nickname }}</p>
      <!-- Outras informações do usuário -->
      <p>Mensagem Aleatória</p>
    </div><!--user-details-->

    <!-- Seção da Lista de Últimos Usuários com quem Interagiu -->
    <div class="recent-interactions" style="flex-grow: 1; overflow-y: auto;">
      <p>Últimas Interações</p>
      <app-chat-list></app-chat-list>
    </div><!--recent-interactions-->
  </div><!--user-info-panel-->

  <!-- Área Principal do Chat -->
  <div class="chat-window-main" style="border: 1px solid black; flex-grow: 1; display: flex; flex-direction: column;">

    <!-- Seção das Salas de Bate-Papo -->
    <div class="chat-rooms" style="border-bottom: 1px solid black; padding: 10px;">
      <p>chat-room</p>
      <app-chat-rooms></app-chat-rooms>
    </div><!--chat-rooms-->

    <!-- Área de Mensagens do Chat -->
    <div class="chat-area" style="flex-grow: 1; overflow-y: auto;">
      <router-outlet></router-outlet>
    </div>

    <!-- Área de Entrada de Mensagens -->
    <div class="chat-input" style="border-top: 1px solid black;">
      <textarea [(ngModel)]="messageContent" style="width: 100%;"></textarea>
      <button (click)="sendMessage()" style="width: 100%;">Enviar</button>
    </div>

  </div><!--chat-window-main-->

</div> <!--chat-module-container-->
