<!-- src/app/layout/friend-management/friend-settings/friend-settings.component.html -->
<section class="friend-settings" aria-labelledby="friend-settings-title">
  <h3 id="friend-settings-title">Configurações de amizade</h3>

  <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
    <mat-slide-toggle formControlName="receiveRequests">
      Permitir receber solicitações de amizade
    </mat-slide-toggle>

    <mat-slide-toggle formControlName="showOnlineStatus">
      Mostrar meu status online
    </mat-slide-toggle>

    <mat-slide-toggle formControlName="allowSearchByNickname">
      Permitir que outros me encontrem pelo nickname
    </mat-slide-toggle>

    <button mat-button color="primary" type="submit">
      Salvar configurações
    </button>
  </form>
</section>
