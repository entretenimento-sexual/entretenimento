<!-- src/app/notifications/user-activity-hub/user-activity-hub.component.html -->

@if (vm$ | async; as vm) {
  @if (vm.actions.length > 0) {
    <section
      class="activity-hub"
      aria-labelledby="activity-hub-title"
      aria-live="polite"
    >
      <div class="activity-hub__intro">
        <span class="activity-hub__eyebrow">Agora</span>
        <h2 id="activity-hub-title">Atividades para revisar</h2>
      </div>

      <div class="activity-hub__rail" role="list">
        @for (action of vm.actions; track trackAction($index, action)) {
          <a
            class="activity-hub__card"
            role="listitem"
            [routerLink]="action.route"
            [attr.aria-label]="action.label + ': ' + action.description + '. ' + action.count + ' pendente(s).'"
          >
            <span class="activity-hub__icon" aria-hidden="true">{{ action.icon }}</span>

            <span class="activity-hub__content">
              <strong>{{ action.label }}</strong>
              <small>{{ action.description }}</small>
            </span>

            <span class="activity-hub__badge" aria-hidden="true">
              {{ action.count > 99 ? '99+' : action.count }}
            </span>
          </a>
        }
      </div>

      <a class="activity-hub__all" routerLink="/notificacoes">
        Ver central
      </a>
    </section>
  }
}
